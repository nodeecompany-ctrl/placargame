<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rei da Quadra</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* ───── PALETA BET365 ───── */
        :root {
            --bg: #282828;
            --bg-card: #383838;
            --bg-card2: #222222;
            --brand-green: #126E51;
            --brand-yellow: #FFDF00;
            --white: #ffffff;
            --gray: #aaaaaa;
            --border: #444444;
            --red: #d32f2f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
        .hidden { display: none !important; }
        .container { padding: 20px; max-width: 480px; margin: 0 auto; }

        /* ───── SPLASH SCREEN ───── */
        #screen-splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #126E51 0%, #0a3d2c 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999;
        }

        .splash-content {
            text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 30px;
        }

        .player-kick-animation {
            width: 200px; height: 200px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .player-kick-svg {
            width: 100%; height: 100%;
            animation: kickAnimation 1.5s ease-in-out infinite;
        }

        @keyframes kickAnimation {
            0% { transform: translateX(-10px) rotate(0deg); }
            50% { transform: translateX(20px) rotate(5deg); }
            100% { transform: translateX(-10px) rotate(0deg); }
        }

        .ball {
            position: absolute; width: 20px; height: 20px; background: var(--brand-yellow);
            border-radius: 50%; top: 60px; right: 40px;
            box-shadow: 0 0 10px rgba(255, 223, 0, 0.6);
            animation: ballFly 1.5s ease-in-out infinite;
        }

        @keyframes ballFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { transform: translate(80px, -60px) scale(1.1); opacity: 1; }
            100% { transform: translate(150px, -100px) scale(0.5); opacity: 0; }
        }

        .splash-title {
            font-family: 'Bebas Neue', sans-serif; font-size: 3.2rem;
            letter-spacing: 4px; color: var(--brand-yellow); text-transform: uppercase;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .splash-subtitle { font-size: 12px; color: var(--white); letter-spacing: 2px; text-transform: uppercase; }

        /* ───── SETUP ───── */
        .app-title {
            text-align: center; margin: 24px 0 20px; font-family: 'Bebas Neue', sans-serif; 
            font-size: 2.6rem; letter-spacing: 3px; color: var(--brand-yellow);
        }
        .setup-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; margin-bottom: 14px;
        }
        .setup-card h3 {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: var(--brand-yellow); margin-bottom: 12px;
        }
        input, textarea, select {
            width: 100%; background: var(--bg-card2); border: 1px solid var(--border);
            color: #fff; padding: 12px 14px; border-radius: 8px; margin-bottom: 10px;
            font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none;
            transition: border-color .2s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--brand-yellow); }
        
        select {
            -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FFDF00' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 14px center;
            background-size: 16px; padding-right: 40px;
        }

        .team-counter { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .team-counter label { font-size: 12px; font-weight: 800; color: var(--gray); text-transform: uppercase; }
        .counter-buttons { display: flex; gap: 8px; }
        .counter-btn {
            width: 36px; height: 36px; border-radius: 6px;
            background: var(--bg-card2); border: 1px solid var(--border);
            color: var(--brand-yellow); font-weight: 800; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .counter-btn:active { background: var(--brand-yellow); color: #000; }
        .counter-value { font-size: 16px; font-weight: 600; color: var(--white); min-width: 20px; text-align: center; }

        /* ───── GAME HEADER ───── */
        .sticky-header {
            position: sticky; top: 0; background: var(--bg);
            z-index: 100; padding-bottom: 12px; border-bottom: 1px solid var(--border);
        }
        .scoreboard-top {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 0; font-size: 11px; color: var(--gray); text-transform: uppercase; font-weight: 600;
        }
        .score-total { text-align: center; }
        .score-total-label { font-size: 9px; color: var(--gray); }
        .score-total-value {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--brand-yellow); line-height: 1;
        }
        .next-badge {
            text-align: center; font-size: 10px; font-weight: 800;
            letter-spacing: 1.5px; color: var(--gray); padding: 8px 0 4px; text-transform: uppercase;
        }
        .scoreboard {
            display: flex; justify-content: space-between; align-items: center; padding: 10px 4px 0; gap: 10px;
        }
        .score-side { flex: 1; display: flex; flex-direction: column; align-items: flex-start; }
        .score-side.right { align-items: flex-end; }
        
        .team-selector-box {
            background-color: var(--bg-card2); border: 1px solid var(--border); color: var(--white);
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; padding: 8px 12px; border-radius: 6px; width: 100%;
            max-width: 140px; margin-bottom: 6px; cursor: pointer;
            text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
            -webkit-appearance: none; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23FFDF00' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 10px center;
            background-size: 14px; padding-right: 30px; transition: border-color 0.2s;
        }
        .team-selector-box:focus { border-color: var(--brand-yellow); outline: none; }
        
        .score-side.right .team-selector-box {
            background-position: left 10px center; padding-right: 12px; padding-left: 30px; direction: rtl; text-align: left;
        }
        
        .score-val { font-family: 'Bebas Neue', sans-serif; font-size: 3.4rem; line-height: 1; color: var(--white); }
        .score-side.right .score-val { color: var(--white); }
        
        .timer-wrap { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .timer-box {
            display: inline-block; background: var(--bg-card2);
            border: 2px solid var(--brand-yellow); color: var(--brand-yellow);
            padding: 6px 16px; border-radius: 8px;
            font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px;
        }
        
        .timer-controls { display: flex; gap: 6px; align-items: center; }
        .pause-btn {
            background: var(--bg-card); border: 1px solid var(--border); color: var(--white);
            width: 32px; height: 32px; border-radius: 50%; font-size: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .pause-btn.paused { background: var(--brand-yellow); color: #000; border-color: var(--brand-yellow); }

        /* ───── PLAYER COMPARISON ROWS ───── */
        .players-section { margin-top: 14px; }
        .cat-divider { display: flex; align-items: center; gap: 8px; margin: 12px 0 6px; }
        .cat-line { flex: 1; height: 1px; background: var(--border); }
        .cat-label { font-size: 9px; font-weight: 800; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }

        .player-match-row { display: flex; align-items: center; gap: 6px; padding: 7px 0; border-bottom: 1px solid #333; }
        .player-match-row:last-child { border-bottom: none; }
        .pm-side { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
        .pm-side.side-b { flex-direction: row-reverse; }

        .pm-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; flex-shrink: 0;
            background: var(--bg-card2); color: var(--brand-yellow); border: 1px solid var(--border);
        }

        .pm-info { flex: 1; min-width: 0; overflow: hidden; }
        .pm-name {
            font-size: 13px; font-weight: 600; color: var(--white);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.1;
        }
        .pm-sub { font-size: 10px; color: var(--gray); margin-top: 2px; }

        .pm-goals {
            font-family: 'Bebas Neue', sans-serif; font-size: 22px;
            line-height: 1; flex-shrink: 0; width: 26px; text-align: center; color: var(--brand-yellow);
        }

        .pm-btn {
            width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
            font-size: 16px; font-weight: 800; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-card2); color: var(--brand-yellow); line-height: 1;
            transition: all 0.2s;
        }
        .pm-btn:active { background: var(--brand-yellow); color: #000; border-color: var(--brand-yellow); transform: scale(0.95); }
        .pm-btn.btn-empty { background: transparent; cursor: default; pointer-events: none; border-color: transparent; }

        .pm-center-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border); flex-shrink: 0; }

        /* ───── BUTTONS ───── */
        .btn {
            width: 100%; padding: 16px; border-radius: 8px; border: none;
            font-weight: 800; text-transform: uppercase; cursor: pointer;
            margin-top: 12px; display: block; text-align: center;
            font-family: 'DM Sans', sans-serif; font-size: 14px;
            letter-spacing: 0.5px; transition: opacity .2s;
        }
        .btn:active { opacity: .8; }
        .btn-main { background: var(--brand-yellow); color: #000; }
        .btn-neutral { background: var(--bg-card); color: var(--white); border: 1px solid var(--border); }
        .btn-red-solid { background: var(--red); color: #fff; margin-top: 8px; }

        /* ───── RANKING ───── */
        #print-area {
            background: var(--brand-green); padding: 20px;
            border-radius: 12px; border: 2px solid var(--brand-yellow);
            color: var(--white);
        }
        .rank-title {
            text-align: center; font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem; letter-spacing: 2px; color: var(--brand-yellow); margin-bottom: 2px;
        }
        .rank-sub { text-align: center; font-size: 11px; color: #ddd; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .rank-section-title {
            font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
            text-transform: uppercase; color: var(--brand-yellow);
            border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 6px; margin-bottom: 8px;
        }
        .rank-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px;
        }
        .rank-item:last-child { border-bottom: none; }
        .rank-pos { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--brand-yellow); margin-right: 10px; width: 20px; }
        .rank-stat { color: var(--white); font-weight: 800; }
        .hashtag {
            text-align: center; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem; letter-spacing: 2px; color: var(--brand-yellow);
            margin-top: 20px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.3);
        }

        /* ───── CUSTOM MODAL ───── */
        #custom-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .modal-box {
            background: var(--bg-card); width: 100%; max-width: 340px;
            border-radius: 12px; padding: 24px; text-align: center;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-box h2 { font-size: 18px; color: var(--brand-yellow); margin-bottom: 12px; text-transform: uppercase; }
        .modal-box p { font-size: 14px; color: var(--white); margin-bottom: 20px; line-height: 1.4; }
        .modal-input { margin-bottom: 20px; text-align: center; font-size: 18px; }
        .modal-buttons { display: flex; gap: 10px; flex-direction: column; }
        .modal-buttons .btn { margin-top: 0; }
        .modal-row-btn { display: flex; gap: 10px; }
        .modal-row-btn .btn { flex: 1; }
    </style>
</head>
<body>

    <div id="screen-splash" class="hidden">
        <div class="splash-content">
            <div class="player-kick-animation">
                <svg class="player-kick-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="50" r="20" fill="#f5d0b5"/>
                    <line x1="100" y1="70" x2="100" y2="120" stroke="#fff" stroke-width="6"/>
                    <line x1="100" y1="80" x2="60" y2="40" stroke="#f5d0b5" stroke-width="5"/>
                    <line x1="100" y1="80" x2="130" y2="100" stroke="#f5d0b5" stroke-width="5"/>
                    <line x1="100" y1="120" x2="70" y2="170" stroke="#222" stroke-width="5"/>
                    <line x1="100" y1="120" x2="150" y2="130" stroke="#222" stroke-width="5"/>
                    <circle cx="155" cy="130" r="8" fill="#111"/>
                </svg>
                <div class="ball"></div>
            </div>

            <div>
                <h1 class="splash-title">REI DA QUADRA</h1>
                <p class="splash-subtitle">Gestão de Peladas</p>
            </div>
            
            <button class="btn btn-main" style="width: auto; padding: 12px 32px; margin-top: 20px;" onclick="skipSplash()">Entrar na Quadra</button>
        </div>
    </div>

    <div id="screen-setup" class="hidden">
        <div class="container">
            <h1 class="app-title">REI DA QUADRA</h1>

            <div class="setup-card">
                <h3>Tempo de Jogo</h3>
                <select id="match-time">
                    <option value="1">1 Minuto (Teste)</option>
                    <option value="5" selected>5 Minutos</option>
                    <option value="10">10 Minutos</option>
                    <option value="15">15 Minutos</option>
                    <option value="20">20 Minutos</option>
                </select>
            </div>

            <div class="setup-card">
                <h3>Quantidade de Times</h3>
                <div class="team-counter">
                    <label>Times:</label>
                    <div class="counter-buttons">
                        <button class="counter-btn" onclick="changeTeamCount(-1)">−</button>
                        <span class="counter-value" id="team-count-display">4</span>
                        <button class="counter-btn" onclick="changeTeamCount(1)">+</button>
                    </div>
                </div>
            </div>

            <div id="teams-container"></div>

            <button class="btn btn-main" onclick="initApp()">Começar Partida</button>
        </div>
    </div>

    <div id="screen-game" class="hidden">
        <div class="container">
            <div class="sticky-header">
                <div class="scoreboard-top">
                    <div></div>
                    <div class="score-total">
                        <div class="score-total-label">Gols Totais</div>
                        <div class="score-total-value" id="total-goals">0</div>
                    </div>
                    <div></div>
                </div>

                <div class="next-badge" id="next-info"></div>

                <div class="scoreboard">
                    <div class="score-side">
                        <select class="team-selector-box" id="select-team-a" onchange="changeCourtTeam('a', this.value)"></select>
                        <div class="score-val" id="val-a">0</div>
                    </div>
                    
                    <div class="timer-wrap">
                        <div class="timer-box" id="clock">5:00</div>
                        <div class="timer-controls">
                            <button class="pause-btn" id="btn-pause" onclick="togglePause()">
                                <i class="fas fa-pause"></i>
                            </button>
                        </div>
                    </div>

                    <div class="score-side right">
                        <select class="team-selector-box" id="select-team-b" onchange="changeCourtTeam('b', this.value)"></select>
                        <div class="score-val" id="val-b">0</div>
                    </div>
                </div>
            </div>

            <div class="players-section">
                <div id="active-players"></div>
            </div>

            <button class="btn btn-neutral" onclick="manualEnd()">Fim de Jogo</button>
            <button class="btn btn-red-solid" onclick="confirmEndPelada()">Encerrar Pelada</button>
        </div>
    </div>

    <div id="screen-ranking" class="hidden">
        <div class="container">
            <div id="print-area">
                <div class="rank-title">🏆 REI DA QUADRA</div>
                <div class="rank-sub">Resultado Final</div>

                <div class="rank-section-title">Top Artilheiros</div>
                <div id="player-rank"></div>

                <div class="rank-section-title" style="margin-top:16px">Ranking de Times</div>
                <div id="team-rank"></div>
                
                <div class="hashtag">#VemPraQuadra</div>
            </div>

            <button class="btn btn-main" onclick="downloadImage()"><i class="fas fa-camera"></i> Tirar Print</button>
            <button class="btn btn-neutral" onclick="novaPartida()">Nova Partida</button>
        </div>
    </div>

    <div id="custom-modal" class="hidden">
        <div class="modal-box">
            <h2 id="modal-title">Título</h2>
            <p id="modal-msg">Mensagem</p>
            <input type="number" id="modal-input" class="modal-input hidden">
            
            <div class="modal-buttons" id="modal-btn-container">
                </div>
        </div>
    </div>

    <script>
        let teams = [];
        let teamCount = 4;
        let court = { a: 0, b: 1 };
        let queue = [2, 3];
        let score = { a: 0, b: 0 };
        let secondsLeft = 300;
        let timer = null;
        let isPaused = false;

        // ═════════════════════════════════════════════════════════
        // UI / MODAL CONTROLLER
        // ═════════════════════════════════════════════════════════
        function showModal({ title, msg, type = 'alert', inputVal = '', btn1Text = 'OK', btn2Text = 'Cancelar', onBtn1, onBtn2 }) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerHTML = msg;
            
            const inputEl = document.getElementById('modal-input');
            const btnContainer = document.getElementById('modal-btn-container');
            
            inputEl.classList.add('hidden');
            btnContainer.innerHTML = '';

            if (type === 'prompt') {
                inputEl.classList.remove('hidden');
                inputEl.value = inputVal;
            }

            if (type === 'alert') {
                btnContainer.innerHTML = `<button class="btn btn-main" id="m-btn-1">${btn1Text}</button>`;
                document.getElementById('m-btn-1').onclick = () => { closeModal(); if(onBtn1) onBtn1(); };
            } 
            else if (type === 'confirm' || type === 'prompt') {
                btnContainer.innerHTML = `
                    <div class="modal-row-btn">
                        <button class="btn btn-neutral" id="m-btn-2">${btn2Text}</button>
                        <button class="btn btn-main" id="m-btn-1">${btn1Text}</button>
                    </div>
                `;
                document.getElementById('m-btn-1').onclick = () => {
                    let val = type === 'prompt' ? inputEl.value : true;
                    closeModal(); if(onBtn1) onBtn1(val);
                };
                document.getElementById('m-btn-2').onclick = () => {
                    closeModal(); if(onBtn2) onBtn2();
                };
            }

            document.getElementById('custom-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }

        // ═════════════════════════════════════════════════════════
        // SPLASH SCREEN
        // ═════════════════════════════════════════════════════════
        window.addEventListener('load', () => {
            if (sessionStorage.getItem('skipSplash') === 'true') {
                document.getElementById('screen-setup').classList.remove('hidden');
                renderTeamsForm();
            } else {
                document.getElementById('screen-splash').classList.remove('hidden');
            }
        });

        function skipSplash() {
            sessionStorage.setItem('skipSplash', 'true');
            document.getElementById('screen-splash').classList.add('hidden');
            document.getElementById('screen-setup').classList.remove('hidden');
            renderTeamsForm();
        }

        // ═════════════════════════════════════════════════════════
        // SETUP
        // ═════════════════════════════════════════════════════════
        function changeTeamCount(delta) {
            const newCount = teamCount + delta;
            if (newCount >= 3 && newCount <= 8) {
                teamCount = newCount;
                document.getElementById('team-count-display').innerText = teamCount;
                renderTeamsForm();
            }
        }

        // Renderiza apenas se estiver vazio para não apagar o que já foi digitado num "Nova Partida"
        function renderTeamsForm() {
            const container = document.getElementById('teams-container');
            if (container.innerHTML.trim() !== '') return; 
            
            for (let i = 1; i <= teamCount; i++) {
                container.innerHTML += `
                    <div class="setup-card">
                        <h3>⚽ Time ${i}</h3>
                        <input type="text" id="t${i}-name" placeholder="Nome do Time" value="Time ${i}">
                        <textarea id="t${i}-players" placeholder="Nomes dos jogadores (1 por linha)" rows="3"></textarea>
                    </div>
                `;
            }
        }

        function initials(name) {
            return name.trim().split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        }

        function initApp() {
            teams = [];
            for (let i = 1; i <= teamCount; i++) {
                const name = document.getElementById(`t${i}-name`).value || `Time ${i}`;
                const playersRaw = document.getElementById(`t${i}-players`).value.split('\n');
                const players = playersRaw.filter(p => p.trim() !== '').map(p => ({ name: p.trim(), goals: 0 }));
                teams.push({ id: i - 1, name, players, wins: 0 });
            }

            if (teams.length === 0) {
                showModal({ title: 'Aviso', msg: 'Adicione pelo menos 1 time!' });
                return;
            }

            court = { a: 0, b: 1 };
            queue = [];
            for (let i = 2; i < teams.length; i++) queue.push(i);

            document.getElementById('screen-setup').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            startMatch();
        }

        function startMatch() {
            score = { a: 0, b: 0 };
            isPaused = false;
            updatePauseUI();
            
            document.getElementById('val-a').innerText = '0';
            document.getElementById('val-b').innerText = '0';
            updateTotalGoals();
            updateTeamSelectors();
            updateNextInfo();
            renderMatchPlayers();

            secondsLeft = parseInt(document.getElementById('match-time').value) * 60;
            updateClockDisplay();
            runTimer();
        }
        
        function updateTeamSelectors() {
            const selectA = document.getElementById('select-team-a');
            const selectB = document.getElementById('select-team-b');
            selectA.innerHTML = ''; selectB.innerHTML = '';

            teams.forEach((t, index) => {
                const optA = document.createElement('option');
                optA.value = index; optA.text = t.name;
                if (index === court.b) optA.disabled = true;
                if (index === court.a) optA.selected = true;
                selectA.appendChild(optA);

                const optB = document.createElement('option');
                optB.value = index; optB.text = t.name;
                if (index === court.a) optB.disabled = true;
                if (index === court.b) optB.selected = true;
                selectB.appendChild(optB);
            });
        }
        
        function changeCourtTeam(side, newTeamIdxStr) {
            const newTeamIdx = parseInt(newTeamIdxStr);
            const oldTeamIdx = court[side];

            if (newTeamIdx === oldTeamIdx) return;

            showModal({
                title: 'Atenção',
                msg: 'Trocar o time irá reiniciar o placar e o cronômetro para esta partida. Confirmar?',
                type: 'confirm',
                btn1Text: 'Trocar Time',
                onBtn1: () => {
                    court[side] = newTeamIdx;
                    queue = queue.filter(id => id !== newTeamIdx);
                    queue.push(oldTeamIdx);
                    startMatch(); 
                },
                onBtn2: () => { updateTeamSelectors(); }
            });
        }

        function updateNextInfo() {
            const nextTeam = queue.length > 0 ? teams[queue[0]] : null;
            document.getElementById('next-info').innerText = nextTeam ? `próximo: ${nextTeam.name}` : 'Próximo: Aguardando';
        }

        function renderMatchPlayers() {
            const container = document.getElementById('active-players');
            container.innerHTML = `
                <div class="cat-divider">
                    <div class="cat-line"></div>
                    <div class="cat-label">Gols marcados</div>
                    <div class="cat-line"></div>
                </div>
            `;

            const playersA = teams[court.a].players;
            const playersB = teams[court.b].players;
            const maxRows = Math.max(playersA.length, playersB.length);

            for (let i = 0; i < maxRows; i++) {
                const pa = playersA[i];
                const pb = playersB[i];

                const sideA = pa ? `
                    <div class="pm-side side-a">
                        <div class="pm-avatar av-a">${initials(pa.name)}</div>
                        <div class="pm-info">
                            <div class="pm-name">${pa.name}</div>
                            <div class="pm-sub">${teams[court.a].name}</div>
                        </div>
                        <div class="pm-goals gls-a" id="g-a-${i}">${pa.goals}</div>
                        <button class="pm-btn btn-a" onclick="addGoal(${court.a}, ${i}, 'a', ${i})"><i class="fas fa-plus"></i></button>
                    </div>
                ` : `<div class="pm-side side-a" style="opacity:0; pointer-events:none"><div class="pm-btn btn-empty"></div></div>`;

                const sideB = pb ? `
                    <div class="pm-side side-b">
                        <div class="pm-avatar av-b">${initials(pb.name)}</div>
                        <div class="pm-info" style="text-align:right">
                            <div class="pm-name">${pb.name}</div>
                            <div class="pm-sub">${teams[court.b].name}</div>
                        </div>
                        <div class="pm-goals gls-b" id="g-b-${i}">${pb.goals}</div>
                        <button class="pm-btn btn-b" onclick="addGoal(${court.b}, ${i}, 'b', ${i})"><i class="fas fa-plus"></i></button>
                    </div>
                ` : `<div class="pm-side side-b" style="opacity:0; pointer-events:none"><div class="pm-btn btn-empty"></div></div>`;

                container.innerHTML += `<div class="player-match-row">${sideA}<div class="pm-center-dot"></div>${sideB}</div>`;
            }
        }

        function addGoal(teamIdx, playerIdx, side, rowIdx) {
            teams[teamIdx].players[playerIdx].goals++;
            score[side]++;
            document.getElementById(`val-${side}`).innerText = score[side];
            document.getElementById(`g-${side}-${rowIdx}`).innerText = teams[teamIdx].players[playerIdx].goals;
            updateTotalGoals();
        }

        function updateTotalGoals() {
            document.getElementById('total-goals').innerText = score.a + score.b;
        }

        // ═════════════════════════════════════════════════════════
        // TIMER
        // ═════════════════════════════════════════════════════════
        function togglePause() {
            isPaused = !isPaused;
            updatePauseUI();
            if(isPaused) {
                clearInterval(timer);
            } else {
                runTimer();
            }
        }

        function updatePauseUI() {
            const btn = document.getElementById('btn-pause');
            if(isPaused) {
                btn.innerHTML = '<i class="fas fa-play"></i>';
                btn.classList.add('paused');
            } else {
                btn.innerHTML = '<i class="fas fa-pause"></i>';
                btn.classList.remove('paused');
            }
        }

        function updateClockDisplay() {
            const m = Math.floor(secondsLeft / 60);
            const s = secondsLeft % 60;
            document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' + s : s}`;
        }

        function runTimer() {
            clearInterval(timer);
            if(isPaused) return;
            timer = setInterval(() => {
                secondsLeft--;
                updateClockDisplay();
                if (secondsLeft <= 0) manualEnd();
            }, 1000);
        }

        // ═════════════════════════════════════════════════════════
        // GAME LOGIC
        // ═════════════════════════════════════════════════════════
        function confirmEndPelada() {
            showModal({
                title: 'Encerrar Pelada?',
                msg: 'Isso vai fechar as partidas de hoje e gerar o ranking final.',
                type: 'confirm',
                btn1Text: 'Encerrar',
                onBtn1: () => { showFinalRanking(); }
            });
        }

        function manualEnd() {
            clearInterval(timer);
            
            if (score.a === score.b) {
                showModal({
                    title: 'Jogo Empatado!',
                    msg: 'Quantos minutos de acréscimo deseja adicionar?<br><br><small>(Digite 0 para desempatar manualmente)</small>',
                    type: 'prompt',
                    inputVal: '2',
                    btn1Text: 'Adicionar',
                    onBtn1: (val) => {
                        let addTime = parseInt(val);
                        if (!isNaN(addTime) && addTime > 0) {
                            secondsLeft = addTime * 60;
                            isPaused = false; updatePauseUI();
                            runTimer();
                        } else {
                            showModal({
                                title: 'Desempate Final',
                                msg: 'Quem venceu a partida e continua na quadra?',
                                type: 'confirm',
                                btn1Text: teams[court.a].name,
                                btn2Text: teams[court.b].name,
                                onBtn1: () => finalizeGame('a', 'b'),
                                onBtn2: () => finalizeGame('b', 'a')
                            });
                        }
                    },
                    onBtn2: () => {
                        isPaused = true;
                        updatePauseUI();
                    }
                });
                return;
            }

            let winnerSide = score.a > score.b ? 'a' : 'b';
            let loserSide = winnerSide === 'a' ? 'b' : 'a';
            finalizeGame(winnerSide, loserSide);
        }

        function finalizeGame(winnerSide, loserSide) {
            teams[court[winnerSide]].wins++;

            let loserId = court[loserSide];
            queue = queue.filter(id => id !== loserId);
            queue.push(loserId);

            if (queue.length > 0) {
                court[loserSide] = queue.shift();
                showModal({
                    title: 'Fim de Jogo!',
                    msg: `O time <strong>${teams[court[winnerSide]].name}</strong> venceu e continua na quadra!`,
                    type: 'alert',
                    btn1Text: 'Próxima Partida',
                    onBtn1: () => { startMatch(); }
                });
            } else {
                showFinalRanking();
            }
        }

        function showFinalRanking() {
            clearInterval(timer);
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-ranking').classList.remove('hidden');

            let allPlayers = [];
            teams.forEach(t => allPlayers.push(...t.players.map(p => ({ ...p, team: t.name }))));
            allPlayers.sort((a, b) => b.goals - a.goals);

            const scorers = allPlayers.filter(p => p.goals > 0);
            document.getElementById('player-rank').innerHTML = scorers.length
                ? scorers.map((p, i) => `
                    <div class="rank-item">
                        <div style="display:flex;align-items:center;gap:4px;">
                            <span class="rank-pos">${i + 1}</span>
                            <div>
                                <div style="font-size:14px;font-weight:600">${p.name}</div>
                                <div style="font-size:10px;color:#aaa">${p.team}</div>
                            </div>
                        </div>
                        <span class="rank-stat">${p.goals} gols</span>
                    </div>
                  `).join('')
                : '<p style="color:#888;font-size:13px;padding:10px 0;text-align:center">Sem gols marcados.</p>';

            const sortedTeams = [...teams].sort((a, b) => b.wins - a.wins);
            document.getElementById('team-rank').innerHTML = sortedTeams.map((t, i) => `
                <div class="rank-item">
                    <div style="display:flex;align-items:center;gap:4px;">
                        <span class="rank-pos">${i + 1}</span>
                        <span style="font-size:14px;font-weight:600">${t.name}</span>
                    </div>
                    <span class="rank-stat">${t.wins} vitórias</span>
                </div>
            `).join('');
        }

        function downloadImage() {
            html2canvas(document.querySelector('#print-area'), {
                backgroundColor: "#126E51", 
                scale: 2 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'rei-da-quadra-resultado.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function novaPartida() {
            // Apenas esconde o ranking e mostra a aba de setup, mantendo os dados digitados!
            document.getElementById('screen-ranking').classList.add('hidden');
            document.getElementById('screen-setup').classList.remove('hidden');
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
